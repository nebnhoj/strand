services:
  app:
    build: .
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://strand:password@mongodb:27017/strand?authSource=admin
      - REDIS_URL=redis://:password@redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongodb:
    image: mongo:latest
    container_name: strand_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: strand
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: strand
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: strand_redis
    command: redis-server --requirepass password
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
